<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap &amp; Roar — Animal Meadow</title>
<meta name="description" content="A tap-anywhere animal sound board for toddlers. Press a letter, meet an animal, hear a happy sound.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- ===================== ANALYTICS (privacy-friendly, no cookies) =====================
     Sign up free at https://www.cloudflare.com/web-analytics/ then paste your own
     token below. If you'd rather use GoatCounter instead, swap this tag for:
     <script data-goatcounter="https://YOURCODE.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
-->
<script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN_HERE"}'></script>
</head>
<body>

  <!-- ===================== SPLASH / START SCREEN ===================== -->
  <!-- Browsers block audio until a real user gesture happens, so this   -->
  <!-- big friendly sun button is both the "app icon" and the gesture    -->
  <!-- that unlocks sound for the whole visit.                           -->
  <div id="splash" class="splash">
    <div class="splash-sky">
      <div class="cloud cloud-a"></div>
      <div class="cloud cloud-b"></div>
      <div class="cloud cloud-c"></div>
    </div>
    <button id="startBtn" class="sun-button" aria-label="Tap the sun to start playing">
      <span class="sun-face">☀</span>
    </button>
    <p class="splash-title">Tap &amp; Roar</p>
    <p class="splash-sub">Tap the sun to play · Stories anytime</p>
  </div>

  <!-- ===================== MAIN MEADOW STAGE ===================== -->
  <main id="stage" class="stage" hidden>

    <h1 class="sr-only">Tap and Roar — an animal letter sound board for toddlers</h1>

    <!-- Sky layer: sun, drifting clouds, and a shooting-star letter -->
    <section class="sky" aria-hidden="true">
      <div class="cloud cloud-a"></div>
      <div class="cloud cloud-b"></div>
      <div class="cloud cloud-c"></div>
      <div class="little-sun"></div>
      <div id="fallingLetter" class="falling-letter"></div>
    </section>

    <!-- Center performance area: the animal that just popped up -->
    <section class="show" aria-live="polite">
      <div id="speechBubble" class="speech-bubble"></div>
      <div id="animalCard" class="animal-card">
        <span id="animalEmoji" class="animal-emoji">🌻</span>
      </div>
    </section>

    <!-- Grass + the big chunky on-screen keyboard (works for taps too) -->
    <section class="grass">
      <div id="keyboard" class="keyboard" role="group" aria-label="Letter buttons"></div>
    </section>

    <!-- Quiet, non-intrusive corner links -->
    <footer class="corner-links">
      <button id="storiesBtn" class="icon-pill stories-pill" aria-haspopup="dialog" aria-controls="storiesModal" title="Stories">📖</button>
      <button id="muteBtn" class="icon-pill" aria-label="Mute sounds" aria-pressed="false">🔊</button>
      <!-- Buy Me a Coffee link hidden for now — remove the comment markers below to bring it back
      <a class="coffee-link" href="https://www.buymeacoffee.com/vermamanojg" target="_blank" rel="noopener">☕ buy me a coffee</a>
      -->
    </footer>

    <!-- Feedback entry point, tucked in the opposite corner from the coffee link -->
    <button id="feedbackBtn" class="feedback-btn" aria-haspopup="dialog" aria-controls="feedbackModal">💬 feedback</button>
  </main>

  <!-- ===================== FEEDBACK MODAL =====================
       Submits to Formspree — sign up free at https://formspree.io,
       create a form, and paste your own endpoint ID below in place
       of YOUR_FORM_ID. Submissions land straight in your inbox. -->
  <div id="feedbackModal" class="feedback-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
    <div class="feedback-card">
      <button id="feedbackClose" class="feedback-close" aria-label="Close feedback form">✕</button>
      <p id="feedbackTitle" class="feedback-title">How's Tap &amp; Roar going?</p>

      <div id="feedbackStars" class="feedback-stars" role="radiogroup" aria-label="Rate your experience">
        <button type="button" class="star" data-value="1" role="radio" aria-checked="false" aria-label="1 star">★</button>
        <button type="button" class="star" data-value="2" role="radio" aria-checked="false" aria-label="2 stars">★</button>
        <button type="button" class="star" data-value="3" role="radio" aria-checked="false" aria-label="3 stars">★</button>
        <button type="button" class="star" data-value="4" role="radio" aria-checked="false" aria-label="4 stars">★</button>
        <button type="button" class="star" data-value="5" role="radio" aria-checked="false" aria-label="5 stars">★</button>
      </div>

      <form id="feedbackForm" action="https://formspree.io/f/mwvddbyg" method="POST">
        <input type="hidden" name="rating" id="ratingInput" value="">
        <textarea name="message" id="feedbackMessage" placeholder="Tell us what your little one loved, or what to add..." rows="3" required></textarea>
        <input type="email" name="email" placeholder="Your email (optional)">
        <button type="submit" class="feedback-submit">Send feedback</button>
      </form>
      <p id="feedbackThanks" class="feedback-thanks" hidden>Thanks so much! 🌻</p>
    </div>
  </div>

  <!-- ===================== STORIES MODAL =====================
       Locale-based JSON stories + family voice recordings (device-local).
       Content: originals & public-domain adaptations only — add licensed
       books via JSON when you provide rights-cleared text. -->
  <div id="storiesModal" class="stories-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="storiesTitle">
    <div class="stories-card">
      <button id="storiesClose" class="feedback-close" aria-label="Close stories">✕</button>
      <p id="storiesTitle" class="feedback-title">Story time</p>

      <label class="stories-field">
        <span id="storiesLangLabel" class="stories-label">Stories language</span>
        <select id="storiesLocale" class="stories-select"></select>
      </label>

      <label class="stories-field">
        <span id="storiesNameLabel" class="stories-label">Child's name</span>
        <input type="text" id="childName" class="stories-input" maxlength="24" autocomplete="off" placeholder="e.g. Mia, Leo">
      </label>

      <div class="stories-field">
        <span id="storiesVoiceLabel" class="stories-label">Narrator</span>
        <div id="voiceList" class="voice-list" role="listbox"></div>
        <button type="button" id="addVoiceBtn" class="stories-secondary">+ Family voice</button>
        <p id="recordHint" class="stories-hint"></p>
      </div>

      <div id="storyList" class="story-list"></div>

      <p id="storyCaption" class="story-caption" aria-live="polite"></p>

      <div class="stories-actions">
        <button type="button" id="storyPlayBtn" class="feedback-submit">Play story</button>
        <button type="button" id="storyStopBtn" class="stories-secondary" hidden>Stop</button>
        <button type="button" id="storyRecordBtn" class="stories-secondary" hidden>Record</button>
      </div>
    </div>
  </div>

  <script src="js/locale.js"></script>
  <script src="js/voices.js"></script>
  <script src="js/stories.js"></script>
  <script src="script.js"></script>
</body>
</html>
